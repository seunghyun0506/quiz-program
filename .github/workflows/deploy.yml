name: Build and Deploy Quiz Program (Docker ARM64)

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build JAR with Gradle
        run: ./gradlew bootJar -x test

      - name: Copy JAR and Dockerfile to Server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "build/libs/*.jar,Dockerfile"
          target: "~/quiz-app"

      - name: Execute Remote SSH Commands to Build and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # 1. 배포 디렉터리로 이동
            cd ~/quiz-app
            
            # 2. 로컬에서 Docker 이미지 빌드 (서버 아키텍처에 맞게 자동 빌드됨)
            sudo docker build -t quiz-program:latest .
            
            # 3. 기존 컨테이너가 가동 중인 경우 중단 및 삭제
            sudo docker stop quiz-program || true
            sudo docker rm quiz-program || true
            
            # 4. 새 컨테이너 백그라운드 구동 (환경 변수 주입)
            sudo docker run -d --name quiz-program \
              -p 6974:6974 \
              -e DB_HOST="${{ secrets.DB_HOST || 'localhost' }}" \
              -e DB_PORT="${{ secrets.DB_PORT || '3306' }}" \
              -e DB_NAME="${{ secrets.DB_NAME || 'quizdb' }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME || 'root' }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              --restart unless-stopped \
              quiz-program:latest
              
            echo "Docker Deployment completed successfully! Container status:"
            sudo docker ps -a | grep quiz-program

