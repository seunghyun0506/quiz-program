name: Build and Deploy Quiz Program (Docker ARM64)

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lowercase Repository Name
        id: string
        run: |
          echo "repo_name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build JAR with Gradle
        run: ./gradlew bootJar -x test

      - name: Set up QEMU (For ARM64 Emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx (Multi-platform Builder)
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image (Targeting ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ steps.string.outputs.repo_name }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Lowercase Repository Name
        id: string
        run: |
          echo "repo_name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Execute Remote SSH Commands to Deploy Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # 1. GHCR 로그인 (워크플로우 토큰 임시 활용)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 2. 최신 ARM64 이미지 Pull
            docker pull ghcr.io/${{ steps.string.outputs.repo_name }}:latest
            
            # 3. 기존 컨테이너가 가동 중인 경우 중단 및 삭제
            docker stop quiz-program || true
            docker rm quiz-program || true
            
            # 4. 새 컨테이너 백그라운드 구동 (H2는 dev, 실서버는 prod 실행을 위해 환경 변수 주입)
            # Secrets 또는 서버 자체 환경 설정 값들을 전달받아 실행합니다.
            docker run -d --name quiz-program \
              -p 6974:6974 \
              -e DB_HOST="${{ secrets.DB_HOST || 'localhost' }}" \
              -e DB_PORT="${{ secrets.DB_PORT || '3306' }}" \
              -e DB_NAME="${{ secrets.DB_NAME || 'quizdb' }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME || 'root' }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              --restart unless-stopped \
              ghcr.io/${{ steps.string.outputs.repo_name }}:latest
              
            echo "Docker Deployment completed successfully! Container status:"
            docker ps -a | grep quiz-program
