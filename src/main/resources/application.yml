spring:
  profiles:
    active: dev

server:
  port: 6974
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: 30m

# Common Thymeleaf Configuration
spring.thymeleaf:
  cache: false
  prefix: classpath:/templates/
  suffix: .html

---
# Dev Profile (H2 Local Development)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:quizdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

---
# Prod Profile (MariaDB Production)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:quizdb}?createDatabaseIfNotExist=true
    driverClassName: org.mariadb.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    show-sql: false
