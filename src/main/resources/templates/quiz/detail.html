<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/main :: head('퀴즈 상세')}"></head>
<body>
    <div th:replace="~{layout/main :: navbar}"></div>

    <main class="app-container">
        <div class="detail-container">
            <div class="card" style="padding: 40px; margin-bottom: 32px;">
                <div class="detail-header">
                    <span style="background-color: var(--primary-glow); color: #818cf8; padding: 6px 12px; border-radius: var(--radius-full); font-size: 13px; font-weight: 700; text-transform: uppercase; margin-bottom: 12px; display: inline-block;">
                        Quiz Details
                    </span>
                    <h1 class="detail-title" th:text="${quiz.title}">퀴즈 제목</h1>
                    
                    <div class="detail-meta">
                        <span><i class="fa-solid fa-circle-question"></i> 문항 수: <strong th:text="${quiz.questions.size()} + '개'">5개</strong></span>
                        <span><i class="fa-solid fa-user"></i> 출제자: <strong th:text="${quiz.creatorNickname}">홍길동</strong></span>
                        <span><i class="fa-solid fa-calendar"></i> 등록일: <strong th:text="${#temporals.format(quiz.createdAt, 'yyyy-MM-dd HH:mm')}">2026-06-10</strong></span>
                    </div>
                </div>

                <div class="detail-desc" th:text="${quiz.description}">
                    퀴즈에 대한 상세한 설명이 렌더링되는 영역입니다.
                </div>

                <div style="border-top: 1px solid var(--border-color); padding-top: 32px;">
                    <h3 style="margin-bottom: 16px;">원하시는 풀이 모드를 선택하세요</h3>
                    
                    <!-- 문제 순서 섞기 체크박스 -->
                    <div style="margin-bottom: 24px; display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="shuffle-checkbox" style="width: 18px; height: 18px; cursor: pointer;">
                        <label for="shuffle-checkbox" style="font-weight: 600; cursor: pointer; color: var(--text-secondary); user-select: none;">
                            <i class="fa-solid fa-shuffle"></i> 문제 순서 무작위로 섞기 (Shuffle)
                        </label>
                    </div>

                    <div class="grid grid-2">
                        <!-- Mode 1: Feedback -->
                        <div class="card card-hover" style="padding: 24px; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between;" onclick="startQuiz('feedback')">
                            <div>
                                <h4 style="color: var(--primary); font-size: 18px; margin-bottom: 8px;">
                                    <i class="fa-solid fa-comments"></i> 실시간 피드백 모드
                                </h4>
                                <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 16px;">
                                    한 문제를 제출할 때마다 즉시 정오답 여부와 해설을 확인할 수 있습니다. 오답 정리에 최적화된 학습 모드입니다.
                                </p>
                            </div>
                            <a href="javascript:startQuiz('feedback')" class="btn btn-primary btn-sm">학습 시작</a>
                        </div>

                        <!-- Mode 2: Test -->
                        <div class="card card-hover" style="padding: 24px; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between;" onclick="startQuiz('test')">
                            <div>
                                <h4 style="color: var(--accent); font-size: 18px; margin-bottom: 8px;">
                                    <i class="fa-solid fa-file-signature"></i> 실전 시험 모드
                                </h4>
                                <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 16px;">
                                    제한 시간 내에 모든 문제를 풀고 최종 제출합니다. 마지막에 전체 점수와 상세 리포트를 확인하여 실전을 대비하는 시험 모드입니다.
                                </p>
                            </div>
                            <a href="javascript:startQuiz('test')" class="btn btn-accent btn-sm">시험 시작</a>
                        </div>
                    </div>
                </div>
            </div>
            
            <div style="text-align: center;">
                <a th:href="@{/quizzes}" class="btn btn-secondary">
                    <i class="fa-solid fa-arrow-left"></i> 목록으로 돌아가기
                </a>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout/main :: footer}"></footer>

    <script th:inline="javascript">
        function startQuiz(mode) {
            const shuffle = document.getElementById('shuffle-checkbox').checked;
            const quizId = [[${quiz.id}]];
            location.href = '/quizzes/' + quizId + '/play?mode=' + mode + (shuffle ? '&shuffle=true' : '');
        }
    </script>
</body>
</html>
