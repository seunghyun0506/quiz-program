<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/main :: head('로그인')}"></head>
<body>
    <div th:replace="~{layout/main :: navbar}"></div>

    <main class="app-container">
        <div class="auth-wrapper">
            <div class="card auth-card">
                <h2 class="auth-title">로그인</h2>
                <p class="auth-subtitle">QuizMaster에 오신 것을 환영합니다</p>

                <!-- Error message if login failed -->
                <div th:if="${param.error}" class="error-message">
                    <i class="fa-solid fa-triangle-exclamation"></i> 이메일 또는 비밀번호가 올바르지 않습니다.
                </div>

                <!-- Success message if registration was successful -->
                <div th:if="${param.registered}" style="background-color: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); color: var(--success); padding: 12px; border-radius: var(--radius-md); font-size: 14px; margin-bottom: 20px;">
                    <i class="fa-solid fa-circle-check"></i> 회원가입이 완료되었습니다. 로그인해 주세요.
                </div>

                <form th:action="@{/auth/login}" method="post">
                    <div class="form-group">
                        <label for="email" class="form-label">이메일 주소</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="example@email.com" required autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">비밀번호</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fa-solid fa-sign-in-alt"></i> 로그인
                    </button>
                </form>

                <p class="auth-footer-text">
                    계정이 없으신가요? <a th:href="@{/auth/register}">회원가입</a>
                </p>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout/main :: footer}"></footer>
</body>
</html>
